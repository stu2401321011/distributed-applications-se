{
  "openapi": "3.0.1",
  "info": {
    "title": "Computer Forum API",
    "description": "\nREST API for a computer hardware forum.\n\nSupports browsing PC components, generating hardware configurations\nbased on budget and intended usage, user authentication, and\ncomment management.\n\n### Authentication\nAuthentication uses JWT Bearer tokens.\n\nAll CRUD operations require JWT Bearer token\n    Obtain a token via `POST /api/user/register` for new users or `POST /api/user/login` for already registered users and pass it as `Authorization: Bearer <token>`.\n\nTokens expire 7 days after issuance.\n\n### Roles\n\n#### Admin\n- Full CRUD access to hardware components\n- Can delete user comments\n- Cannot access user configurations\n- Cannot manage users\n\n#### User\n- Read-only access to hardware components\n- Create Read and Update access to their own comments\n- Create Read and Delete access to their own configurations\n\n### Error handling\nErrors are returned using standard HTTP status codes.\n",
    "version": "v1"
  },
